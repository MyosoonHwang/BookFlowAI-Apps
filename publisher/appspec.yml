version: 0.0
os: linux

files:
  - source: src/
    destination: /var/www/publisher
    overwrite: true

hooks:
  BeforeInstall:
    - location: scripts/before-install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after-install.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate-service.sh
      timeout: 120
      runas: root
