# RDS password + JWT signing key + GCP SA key from AWS Secrets Manager via ESO.
# FORECAST_GCP_SA_KEY_JSON: bookflow-aws-connector SA (bigquery.dataEditor+jobUser on bookflow_dw)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: forecast-svc-secret
  namespace: bookflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bookflow-aws-secrets
    kind: ClusterSecretStore
  target:
    name: forecast-svc-secret
    creationPolicy: Owner
  data:
    - secretKey: FORECAST_RDS_PASSWORD
      remoteRef:
        key: bookflow/rds/master-password
        property: password
    - secretKey: AUTH_JWT_SIGNING_KEY
      remoteRef:
        key: bookflow/auth/jwt-signing-key
    - secretKey: FORECAST_GCP_SA_KEY_JSON
      remoteRef:
        key: bookflow/glue/gcp-sa-key
