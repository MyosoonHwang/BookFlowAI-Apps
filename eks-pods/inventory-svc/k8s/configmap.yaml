apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-svc-env
  namespace: bookflow
data:
  INVENTORY_RDS_HOST: "bookflow-rds.cluster-xxx.ap-northeast-1.rds.amazonaws.com"
  INVENTORY_RDS_PORT: "5432"
  INVENTORY_RDS_DB: "bookflow"
  INVENTORY_RDS_USER: "inventory_svc"
  INVENTORY_REDIS_HOST: "bookflow-redis.xxx.cache.amazonaws.com"
  INVENTORY_REDIS_PORT: "6379"
  INVENTORY_AUTH_MODE: "mock"
  INVENTORY_LOG_LEVEL: "INFO"
