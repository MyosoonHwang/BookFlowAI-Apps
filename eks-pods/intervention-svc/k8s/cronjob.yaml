apiVersion: batch/v1
kind: CronJob
metadata:
  name: intervention-auto-execute
  namespace: bookflow
  labels:
    app: intervention-svc
    component: cronjob
spec:
  # 08:00 KST = 23:00 UTC (전날). 발의일 오전 8시 일괄 batch (URGENT 자동 승인 + NORMAL D-1 자동 거절).
  # 평일 가동 9-18 KST 업무시간 직전에 한 번 실행.
  schedule: "0 23 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: intervention-svc
            component: cronjob
        spec:
          serviceAccountName: intervention-svc
          restartPolicy: Never
          containers:
            - name: auto-execute
              image: ${ECR_REGISTRY}/bookflow/intervention-svc:${IMAGE_TAG}
              imagePullPolicy: Always
              command: ["python", "-m", "src.cron.auto_execute"]
              envFrom:
                - configMapRef:
                    name: intervention-svc-env
                - secretRef:
                    name: intervention-svc-secret
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
