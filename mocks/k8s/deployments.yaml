# 5 mock services in stubs namespace.
# Image tag is templated: ${ECR}/${name}:${tag}
# CI builds via mocks/build-all.sh (Dockerfile + per-mock src/).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-entra-mock
  namespace: stubs
  labels: { app: azure-entra-mock, csp: azure }
spec:
  replicas: 1
  selector:
    matchLabels: { app: azure-entra-mock }
  template:
    metadata:
      labels: { app: azure-entra-mock, csp: azure }
    spec:
      containers:
        - name: app
          image: REPLACE_ME/bookflow/azure-entra-mock:latest
          ports:
            - { containerPort: 80, name: http }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: azure-entra-mock
  namespace: stubs
spec:
  selector: { app: azure-entra-mock }
  ports: [{ name: http, port: 80, targetPort: 80 }]
